name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mrasyscont
          POSTGRES_PASSWORD: mrasyscont
          POSTGRES_DB: mrasyscont
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mrasyscont -d mrasyscont"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mrasyscont:mrasyscont@localhost:5432/mrasyscont?schema=public
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Migration check
        run: npm run db:migration:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tenancy tests
        run: npm run test:tenancy

      - name: Permission tests
        run: npm run test:permissions

      - name: Full tests
        run: npm test

      - name: Build
        run: npm run build
