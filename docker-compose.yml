services:
  postgres:
    image: postgres:16-alpine
    container_name: mrasyscont-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mrasyscont
      POSTGRES_PASSWORD: mrasyscont
      POSTGRES_DB: mrasyscont
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrasyscont -d mrasyscont"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
