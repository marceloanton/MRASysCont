name: Technical Debt
description: Registrar deuda tecnica con criterio de reingreso
labels: [tech-debt]
body:
  - type: textarea
    id: debt
    attributes:
      label: Deuda
      description: Que quedo pendiente
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Riesgo
    validations:
      required: true
  - type: textarea
    id: reentry
    attributes:
      label: Criterio de reingreso
      description: Condicion objetiva para retomarlo
    validations:
      required: true
  - type: input
    id: phase
    attributes:
      label: Fase relacionada
