name: Pre-Phase Audit
description: Solicitar auditoria pre-fase sin implementar codigo
labels: [audit]
body:
  - type: input
    id: phase
    attributes:
      label: Fase a auditar
      placeholder: Fase 9
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Objetivo de auditoria
    validations:
      required: true
  - type: textarea
    id: required_checks
    attributes:
      label: Quality gates requeridos
      value: |
        - npx prisma validate
        - npm run db:migration:check
        - npm run lint
        - npm run typecheck
        - npm run test:tenancy
        - npm run test:permissions
        - npm test
        - npm run build
